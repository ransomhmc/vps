<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VPS Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; padding: 24px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  header h1 { font-size: 22px; font-weight: 600; }
  header time { font-size: 13px; color: #8b949e; }

  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 24px; margin-bottom: 24px;
  }
  .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #f0f6fc; }

  .uptime-grid { display: flex; flex-direction: column; gap: 10px; }

  .host-card {
    background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
    padding: 10px 14px;
  }
  .host-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .host-head strong { font-size: 13px; color: #e6edf3; }

  .uptime-bar {
    display: flex; gap: 2px; height: 20px; align-items: stretch;
    margin-bottom: 6px; overflow: hidden;
  }
  .seg { min-width: 3px; border-radius: 1px; flex: 1 1 0; cursor: pointer; position: relative; }
  .seg:hover { opacity: 0.8; }
  .seg-tip {
    position: fixed; z-index: 100; pointer-events: none;
    background: #1c2128; border: 1px solid #444c56; border-radius: 6px;
    padding: 6px 10px; font-size: 12px; color: #e6edf3;
    white-space: nowrap; display: none;
  }
  .seg-tip.show { display: block; }
  .seg-ok { background: #3fb950; }
  .seg-fail { background: #f85149; }
  .seg-empty { color: #8b949e; font-size: 11px; width: 100%; text-align: center; line-height: 20px; }

  .host-stats {
    display: flex; gap: 16px; font-size: 11px; color: #8b949e;
  }
  .host-stats b { color: #e6edf3; font-weight: 500; }

  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-ok { background: #1a3a2a; color: #3fb950; }
  .badge-warn { background: #3a2a1a; color: #d29922; }
  .badge-err { background: #3a1a1a; color: #f85149; }

  .speed-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .speed-card { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 10px; }
  .speed-card h3 { font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #e6edf3; }
  .speed-card .chart-wrap { position: relative; height: 100px; }
  .speed-card .chart-wrap canvas { width: 100% !important; height: 100% !important; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #21262d; }
  th { color: #8b949e; font-weight: 500; font-size: 11px; text-transform: uppercase; }
  td { font-variant-numeric: tabular-nums; }
  .login-none { color: #8b949e; font-style: italic; }

  .refreshing { opacity: 0.5; pointer-events: none; }
  .error-msg { color: #f85149; background: #2d0a0e; border: 1px solid #f85149; border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; display: none; }
  .error-msg.show { display: block; }

  @media (max-width: 768px) {
    body { padding: 12px; }
    .host-stats { flex-wrap: wrap; gap: 8px; }
    .seg { min-width: 2px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>VPS Monitor</h1>
    <time id="lastUpdate"></time>
  </header>

  <div id="errorMsg" class="error-msg"></div>
  <div id="segTip" class="seg-tip"></div>

  <div class="card">
    <h2>Uptime — Last 24 Hours</h2>
    <div class="uptime-grid" id="uptimeGrid"></div>
  </div>

  <div class="card">
    <h2>Download Speed — Last 7 Days</h2>
    <div class="speed-grid" id="speedGrid"></div>
  </div>

  <div class="card">
    <h2>Recent Logins (Non-100.x)</h2>
    <table><thead><tr><th>Time</th><th>Host</th><th>User</th><th>Source IP</th></tr></thead><tbody id="loginBody"></tbody></table>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
